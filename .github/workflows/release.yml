name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Hex
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "28"

      - run: mix deps.get

      - name: Verify build
        env:
          MIX_ENV: test
        run: |
          mix dialyzer --plt
          mix ci

      - name: Publish package
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the body between this version's heading and the next "## [" heading.
          notes="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/      { exit }
            capture                  { print }
          ' CHANGELOG.md)"
          # Trim leading/trailing blank lines.
          notes="$(printf '%s\n' "$notes" | sed -e '/./,$!d' | tac | sed -e '/./,$!d' | tac)"
          # Write to a file rather than a step output: passing the body via
          # --notes-file keeps backticks/$()/$VAR in the changelog from being
          # interpreted by the shell that runs the next step.
          if [ -n "$notes" ]; then
            printf '%s\n' "$notes" > release_notes.md
          else
            printf '%s\n' "Release $GITHUB_REF_NAME" > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
