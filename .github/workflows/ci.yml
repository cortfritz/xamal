name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "28"

      - name: Restore deps and build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-lint-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-lint-

      # The Dialyzer PLT is pinned to _build/dev/dialyxir_plt.plt in mix.exs,
      # cached separately so it survives mix.lock changes that don't touch it.
      # Keyed on the Elixir/OTP version too — a PLT is invalid across OTP versions.
      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: _build/dev/dialyxir_plt.plt
          key: ${{ runner.os }}-plt-elixir1.20-otp28-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-elixir1.20-otp28-

      - run: mix deps.get

      - name: Build Dialyzer PLT
        env:
          MIX_ENV: test
        run: mix dialyzer --plt

      - run: mix ci.lint

  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "28"

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps and build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix ci.test
